name: BI Daily Refresh

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-bi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas requests

      - name: Run BI refresh
        env:
          BI_API_KEY: ${{ secrets.BI_API_KEY }}
        run: |
          python scripts/fetch_bordeaux_index_price_list.py
          python scripts/build_price_history_daily.py --bi
          python scripts/build_bi_best_offer_comparison.py
          python scripts/build_action_queue.py --include-rejected-csv
          python scripts/build_price_trends_combined.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add db/wine.db data/*.csv || true
          git commit -m "Daily BI refresh" || echo "No changes to commit"
          git push