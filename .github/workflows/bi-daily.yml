name: BI Daily Refresh

on:
  schedule:
    - cron: "30 7 * * *"   # Runs daily at 07:30 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-bi:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests python-dotenv openpyxl

      - name: Ensure folders exist
        run: |
          mkdir -p db
          mkdir -p data

      - name: Run BI pipeline
        env:
          BI_USERNAME: ${{ secrets.BI_USERNAME }}
          BI_PASSWORD: ${{ secrets.BI_PASSWORD }}
          BI_SALES_LEDGER: ${{ secrets.BI_SALES_LEDGER }}
          BI_PURCHASE_LEDGER: ${{ secrets.BI_PURCHASE_LEDGER }}
        run: |
          echo "Running BI fetch..."
          python scripts/fetch_bordeaux_index_price_list.py

          echo "Building BI history..."
          python scripts/build_price_history_daily.py --bi

          echo "Rebuilding comparison + signals..."
          python scripts/build_bi_best_offer_comparison.py
          python scripts/build_action_queue.py --include-rejected-csv

          echo "Rebuilding trends..."
          python scripts/build_price_trends_combined.py

      - name: Commit updated database
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add db/wine.db || true
          git commit -m "Daily BI refresh" || echo "No changes"

          git push