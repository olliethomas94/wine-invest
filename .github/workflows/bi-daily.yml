name: BI Daily Snapshot

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-bi:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests python-dotenv

      - name: Fetch BI snapshot
        env:
          BI_USERNAME: ${{ secrets.BI_USERNAME }}
          BI_PASSWORD: ${{ secrets.BI_PASSWORD }}
          BI_SALES_LEDGER: ${{ secrets.BI_SALES_LEDGER }}
          BI_PURCHASE_LEDGER: ${{ secrets.BI_PURCHASE_LEDGER }}
        run: |
          python scripts/fetch_bi_snapshot_csv.py

      - name: Commit snapshot
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/bi-price-list_*.csv
          git commit -m "Daily BI snapshot" || echo "No changes"
          git push